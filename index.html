<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Command Terminal</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff00;
            font-family: monospace;
            padding: 2rem;
            margin: 0;
        }
        header {
            border-b: 1px solid #1f2937;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a2a2a;
        }
        h1 {
            color: #d4af37;
            font-size: 1.75rem;
            margin: 0;
        }
        .clocks {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
            color: #00ffff;
        }
        .feed-strip {
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #ff0000;
            border-radius: 4px;
        }
        .feed-strip h2 {
            color: #ff0000;
            margin: 0 0 0.5rem 0;
            font-size: 1rem;
        }
        .feed-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .feed-links a {
            color: #ff3333;
            text-decoration: underline;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
        }
        .panel {
            background-color: #1a1a1a;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }
        .panel h2 {
            color: #d4af37;
            margin-top: 0;
        }
        select {
            background-color: #000;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 0.5rem;
            width: 100%;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            font-weight: bold;
        }
        .search-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .search-row span {
            color: #fff;
        }
        .search-row strong {
            color: #888;
        }
        .launch-btn {
            color: #00ffff;
            text-decoration: underline;
            font-size: 0.85rem;
        }
        .source-list {
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .source-item {
            display: block;
            padding: 0.5rem;
            text-decoration: none;
            color: #00ffff;
            border-bottom: 1px solid #222;
        }
        .source-tag {
            color: #888;
            margin-right: 0.5rem;
            font-size: 0.85rem;
        }
        .source-name {
            color: #fff;
        }
        .source-desc {
            display: block;
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.15rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚜️ OSINT NEXUS TERMINAL v1.2</h1>
        <div class="clocks">

            <span id="clk-tyo">TYO (UTC+9): LOADING...</span>
            <span id="clk-sel">SEL (UTC+9): LOADING...</span>

    </header>

            <a href="https://www.tsunami.gov/" target="_blank" rel="noopener noreferrer">PACIFIC TSUNAMI ALERTS</a>
            <a href="https://liveuamap.com/" target="_blank" rel="noopener noreferrer">LIVE CONFLICT MONITOR</a>
        </div>
    </section>

    <div class="container">
        <div class="panel">
            <h2>>> TACTICAL RECON</h2>

            <select id="keyword-select" onchange="updateTranslations()"></select>

            <div id="translation-rows"></div>
        </div>

        <div class="panel">
            <h2>>> STRATEGIC INTEL NODES (60+)</h2>
            <div class="source-list" id="source-container"></div>
        </div>
    </div>

          { en: "Spill", ml: "Tumpahan", id: "Tumpahan", tl: "Tapon", kr: "유출", zh: "溢出", jp: "流出" }

        const sources = [
          { region: "Global", name: "USGS Earthquake Tracker", type: "Seismic Map", url: "https://earthquake.usgs.gov/earthquakes/map/" },
          { region: "Global", name: "NASA FIRMS", type: "Thermal Satellite / Fire", url: "https://firms.modaps.eosdis.nasa.gov/map/" },
          { region: "Global", name: "Liveuamap World", type: "Live Geopolitical Incidents", url: "https://liveuamap.com/" },

          { region: "Global", name: "Crisis24 Risk", type: "Geopolitical Intelligence Bulletins", url: "https://crisis24.garda.com/" },
          { region: "Japan", name: "JMA Agency", type: "Official Meteorological & Seismic Warnings", url: "https://www.jma.go.jp/" },

          { region: "Japan", name: "Nikkei Asia", type: "Macroeconomic & Regional Security Intel", url: "https://asia.nikkei.com/" },

          { region: "Japan", name: "TEPCO Grid Monitor", type: "Critical Electrical Outages", url: "https://www.tepco.co.jp/en/" },
          { region: "China", name: "SCMP Hong Kong", type: "Regional Cross-Border Intelligence Coverage", url: "https://www.scmp.com/" },
          { region: "China", name: "What's on Weibo", type: "Social Listening & Censorship Tracking", url: "https://www.whatsonweibo.com/" },

          { region: "China", name: "Sixth Tone", type: "Domestic Social Dynamic Reports", url: "https://www.sixthtone.com/" },

          { region: "HK", name: "HK Free Press", type: "Independent Domestic Legal/Civil Wire", url: "https://hongkongfp.com/" },

          { region: "Taiwan", name: "Focus Taiwan", type: "English-Language National Incident Wire", url: "https://focustaiwan.tw/" },
          { region: "Philippines", name: "PAGASA Weather", type: "National Tropical Cyclonic Monitoring", url: "https://www.pagasa.dost.gov.ph/" },

          { region: "Indonesia", name: "BMKG Indonesia", type: "National Seismic, Tsunamigenic & Weather", url: "https://www.bmkg.go.id/" },

          { region: "Singapore", name: "Straits Times", type: "National Security & Geopolitical Tracker", url: "https://www.straitstimes.com/" },

          { region: "Malaysia", name: "Bernama News", type: "Official State Press Agency Feed", url: "https://www.bernama.com/" },

          { region: "Thailand", name: "Bangkok Post", type: "Primary National Security Desk", url: "https://www.bangkokpost.com/" },
          { region: "Tools", name: "IntelTechniques", type: "Advanced Frameworks & OSINT Search Arrays", url: "https://inteltechniques.com/" },
          { region: "Tools", name: "Bellingcat Toolkit", type: "Geospatial & Document Verification Indexes", url: "https://www.bellingcat.com/resources/" },
          { region: "Tools", name: "Epieos Investigator", type: "Reverse Email & Identity Footprinting", url: "https://epieos.com/" },

          { region: "Tools", name: "SunCalc Terminal", type: "Chronological Shadow & Horizon Calculator", url: "https://www.suncalc.org/" },

          { region: "Cyber", name: "HaveIBeenPwned", type: "Corporate Data Breach Index", url: "https://haveibeenpwned.com/" },

          { region: "Emergency", name: "Red Cross Mapping", type: "Active Disaster Mitigation & Resource Feeds", url: "https://www.redcross.org/" }

        const languages = [
            { code: 'en', label: 'ENGLISH', base: 'https://www.google.com/search?tbm=nws&q=' },
            { code: 'ml', label: 'MALAY', base: 'https://www.facebook.com/search/top/?q=' },
            { code: 'id', label: 'INDONESIAN', base: 'https://www.facebook.com/search/top/?q=' },
            { code: 'tl', label: 'TAGALOG', base: 'https://www.facebook.com/search/top/?q=' },
            { code: 'kr', label: 'KOREAN', base: 'https://twitter.com/search?q=' },
            { code: 'zh', label: 'CHINESE', base: 'https://s.weibo.com/weibo/' },
            { code: 'jp', label: 'JAPANESE', base: 'https://twitter.com/search?q=' }
        ];

        // INITIALIZE DROP-DOWN
        const selectEl = document.getElementById('keyword-select');
        keywords.forEach(k => {
            const opt = document.createElement('option');
            opt.value = k.en;
            opt.textContent = k.en;
            selectEl.appendChild(opt);
        });

        // REFRESH TRANSLATION BLOCKS
        function updateTranslations() {
            const currentSelected = selectEl.value;
            const record = keywords.find(k => k.en === currentSelected);
            const container = document.getElementById('translation-rows');
            container.innerHTML = '';

            languages.forEach(lang => {
                const translatedWord = record[lang.code] || currentSelected;
                const targetUrl = lang.base + encodeURIComponent(translatedWord);

                const row = document.createElement('div');
                row.className = 'search-row';
                row.innerHTML = `
                    <span><strong>${lang.label}:</strong> ${translatedWord}</span>
                    <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="launch-btn">DEPLOY SEARCH ↗</a>
                `;
                container.appendChild(row);
            });
        }

        // POPULATE STRATEGIC LINKS
        const sourceContainer = document.getElementById('source-container');
        sources.forEach(s => {
            const item = document.createElement('a');
            item.className = 'source-item';
            item.href = s.url;
            item.target = '_blank';
            item.rel = 'noopener noreferrer';
            item.innerHTML = `
                <span class="source-tag">[${s.region}]</span>
                <span class="source-name">${s.name}</span>
                <span class="source-desc">// ${s.type}</span>
            `;
            sourceContainer.appendChild(item);
        });

        // CHRONOLOGICAL TIME ZONE TRACKING
        function updateClocks() {
            const now = new Date();
            const formatOptions = (offset) => {
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const localTarget = new Date(utc + (3600000 * offset));
                return localTarget.toLocaleTimeString();
            };
            document.getElementById('clk-pek').textContent = `PEK (UTC+8): ${formatOptions(8)}`;
            document.getElementById('clk-tyo').textContent = `TYO (UTC+9): ${formatOptions(9)}`;
            document.getElementById('clk-sel').textContent = `SEL (UTC+9): ${formatOptions(9)}`;
            document.getElementById('clk-syd').textContent = `SYD (UTC+10): ${formatOptions(10)}`;
        }

        setInterval(updateClocks, 1000);
        updateClocks();
        updateTranslations();
    </script>
</body>
</html>
